<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Pi Agent · Logs</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%B0%EF%B8%8F%3C/text%3E%3C/svg%3E"
    />
    <style>
      :root {
        --void: #07080c;
        --panel: #0d0f16;
        --panel2: #12141d;
        --edge: #1d2030;
        --edge2: #2a2e42;
        --ink: #e7e9f2;
        --dim: #9aa0b8;
        --faint: #5b6080;
        --pi: #7c5cff;
        --pi2: #a78bff;
        --soyuz: #ff7a45;
        --mint: #2fe6b0;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--void);
        color: var(--ink);
        font: 14px/1.5 Inter, ui-sans-serif, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .aurora {
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background:
          radial-gradient(55% 45% at 10% 0%, rgba(124, 92, 255, 0.16), transparent 70%),
          radial-gradient(45% 40% at 100% 100%, rgba(255, 122, 69, 0.12), transparent 70%);
      }
      .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 22px 18px 60px; }
      header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
      .logo {
        width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center;
        background: linear-gradient(135deg, var(--pi), var(--soyuz));
        box-shadow: 0 8px 24px -10px var(--pi); font-size: 20px;
      }
      h1 { font-size: 17px; margin: 0; }
      .sub { font-size: 12px; color: var(--faint); }
      .spacer { flex: 1; }
      button, input {
        font: inherit; color: var(--ink); border-radius: 9px; outline: none;
        border: 1px solid var(--edge); background: var(--panel2);
        padding: 8px 12px; transition: 0.15s;
      }
      input:focus { border-color: var(--pi); }
      button { cursor: pointer; }
      button:hover { border-color: var(--edge2); }
      .btn-primary {
        background: linear-gradient(135deg, var(--pi), #6244e0); border-color: transparent;
        box-shadow: 0 6px 20px -10px var(--pi);
      }
      .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
      .stat {
        background: var(--panel); border: 1px solid var(--edge); border-radius: 14px; padding: 14px 16px;
      }
      .stat .n { font-size: 26px; font-weight: 600; }
      .stat .l { font-size: 11px; color: var(--faint); text-transform: uppercase; letter-spacing: 0.06em; }
      .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; }
      .toolbar input { flex: 1; }
      .row {
        background: var(--panel); border: 1px solid var(--edge); border-radius: 14px;
        padding: 14px 16px; margin-bottom: 10px;
      }
      .meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; font-size: 11.5px; color: var(--faint); margin-bottom: 8px; }
      .chip { padding: 2px 8px; border-radius: 999px; border: 1px solid var(--edge2); }
      .chip.model { color: var(--soyuz); border-color: color-mix(in oklab, var(--soyuz) 35%, transparent); }
      .chip.art { color: var(--mint); border-color: color-mix(in oklab, var(--mint) 35%, transparent); }
      .chip.user { color: var(--pi2); border-color: color-mix(in oklab, var(--pi) 35%, transparent); }
      .prompt { white-space: pre-wrap; word-break: break-word; }
      details { margin-top: 8px; }
      summary { cursor: pointer; color: var(--dim); font-size: 12.5px; user-select: none; }
      pre {
        background: #05060a; border: 1px solid var(--edge); border-radius: 10px; padding: 12px;
        overflow: auto; max-height: 360px; font: 12px/1.5 "JetBrains Mono", ui-monospace, monospace;
        color: var(--dim); white-space: pre-wrap; word-break: break-word; margin: 8px 0 0;
      }
      .gate {
        position: fixed; inset: 0; z-index: 10; display: grid; place-items: center;
        background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(6px);
      }
      .gate .card {
        background: var(--panel); border: 1px solid var(--edge2); border-radius: 16px;
        padding: 26px; width: min(92vw, 380px); text-align: center;
      }
      .gate input { width: 100%; margin: 14px 0; text-align: center; }
      .err { color: var(--soyuz); font-size: 12.5px; min-height: 16px; }
      .empty { text-align: center; color: var(--faint); padding: 50px 0; }
      @media (max-width: 720px) { .stats { grid-template-columns: repeat(2, 1fr); } }
    </style>
  </head>
  <body>
    <div class="aurora"></div>
    <div class="wrap">
      <header>
        <div class="logo">🛰️</div>
        <div>
          <h1>Pi Agent · Request Logs</h1>
          <div class="sub">Soyuz · what users are building</div>
        </div>
        <div class="spacer"></div>
        <button id="refresh" class="btn-primary">↻ Refresh</button>
        <button id="logout" title="Forget token">⎋</button>
      </header>

      <div class="stats" id="stats"></div>
      <div class="toolbar">
        <input id="q" placeholder="Search prompts & responses…" />
        <button id="search">Search</button>
      </div>
      <div id="list"><div class="empty">Loading…</div></div>
    </div>

    <div class="gate" id="gate" style="display: none">
      <div class="card">
        <div class="logo" style="margin: 0 auto 8px">🛰️</div>
        <div style="font-weight: 600; font-size: 15px">Admin token</div>
        <div class="sub">Enter the ADMIN_TOKEN to view logs</div>
        <input id="token" type="password" placeholder="token" autocomplete="off" />
        <div class="err" id="gateErr"></div>
        <button class="btn-primary" id="enter" style="width: 100%">Enter</button>
      </div>
    </div>

    <script>
      const TK = "piagent.adminToken";
      let token = localStorage.getItem(TK) || "";
      const $ = (id) => document.getElementById(id);
      const esc = (s) =>
        String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      const ago = (iso) => {
        const d = (Date.now() - new Date(iso)) / 1000;
        if (d < 60) return Math.floor(d) + "s ago";
        if (d < 3600) return Math.floor(d / 60) + "m ago";
        if (d < 86400) return Math.floor(d / 3600) + "h ago";
        return Math.floor(d / 86400) + "d ago";
      };

      function showGate(msg) {
        $("gate").style.display = "grid";
        $("gateErr").textContent = msg || "";
        $("token").focus();
      }

      async function load() {
        if (!token) return showGate();
        const q = encodeURIComponent($("q").value.trim());
        let res;
        try {
          res = await fetch(`/api/recent?limit=200&q=${q}`, {
            headers: { Authorization: "Bearer " + token },
          });
        } catch (e) {
          $("list").innerHTML = `<div class="empty">Network error</div>`;
          return;
        }
        if (res.status === 401) {
          token = "";
          localStorage.removeItem(TK);
          return showGate("Wrong token");
        }
        if (res.status === 503) {
          $("list").innerHTML = `<div class="empty">ADMIN_TOKEN is not set on the server.</div>`;
          return;
        }
        if (!res.ok) {
          $("list").innerHTML = `<div class="empty">Server error</div>`;
          return;
        }
        $("gate").style.display = "none";
        const { rows, stats } = await res.json();
        renderStats(stats);
        renderRows(rows);
      }

      function renderStats(s) {
        const cards = [
          ["Total requests", s.total],
          ["Last 24h", s.today],
          ["Unique users", s.users],
          ["With app", s.artifacts],
        ];
        $("stats").innerHTML = cards
          .map((c) => `<div class="stat"><div class="n">${c[1] ?? 0}</div><div class="l">${c[0]}</div></div>`)
          .join("");
      }

      function renderRows(rows) {
        if (!rows.length) {
          $("list").innerHTML = `<div class="empty">No requests yet.</div>`;
          return;
        }
        $("list").innerHTML = rows
          .map((r) => {
            const resp = r.response
              ? `<details><summary>Response${r.has_artifact ? " · contains app" : ""} (${(r.response.length / 1024).toFixed(1)} KB)</summary><pre>${esc(r.response)}</pre></details>`
              : `<div class="sub" style="margin-top:6px">no response logged</div>`;
            return `<div class="row">
              <div class="meta">
                <span>${ago(r.created_at)}</span>
                <span class="chip model">${esc(r.model_id || "?")}</span>
                ${r.project_name ? `<span class="chip">${esc(r.project_name)}</span>` : ""}
                ${r.has_artifact ? `<span class="chip art">app</span>` : ""}
                <span class="chip user" title="${esc(r.client_id)}">${esc((r.client_id || "anon").slice(0, 8))}</span>
              </div>
              <div class="prompt">${esc(r.prompt)}</div>
              ${resp}
            </div>`;
          })
          .join("");
      }

      $("enter").onclick = () => {
        token = $("token").value.trim();
        localStorage.setItem(TK, token);
        load();
      };
      $("token").addEventListener("keydown", (e) => e.key === "Enter" && $("enter").click());
      $("refresh").onclick = load;
      $("search").onclick = load;
      $("q").addEventListener("keydown", (e) => e.key === "Enter" && load());
      $("logout").onclick = () => {
        localStorage.removeItem(TK);
        token = "";
        showGate();
      };

      load();
      setInterval(() => { if (token && $("gate").style.display === "none") load(); }, 15000);
    </script>
  </body>
</html>
