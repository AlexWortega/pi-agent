name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            space_hermes/package-lock.json

      # Pi Agent (root) — served at /pi-agent/
      - name: Install Pi Agent deps
        run: npm ci
      - name: Build Pi Agent
        run: npm run build

      # Hermes Agent (space_hermes/) — served at /pi-agent/hermes/
      - name: Install Hermes deps
        working-directory: space_hermes
        run: npm ci
      - name: Build Hermes
        working-directory: space_hermes
        env:
          # Provide the keenable.ai key via GitHub Secrets so it never lands in the repo.
          # Falls back to "" → web_search uses DDG/Wikipedia fallbacks if the secret is unset.
          VITE_KEENABLE_API_KEY: ${{ secrets.KEENABLE_API_KEY }}
        run: npm run build

      - name: Mount Hermes under /hermes/
        run: |
          mkdir -p dist/hermes
          cp -R space_hermes/dist/. dist/hermes/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
